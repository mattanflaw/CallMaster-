<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PORTOR – Créez votre SaaS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-animation"></div>
  <div class="container">
    <div class="glass-card">
      <!-- Logo PORTOR avec </> -->
      <div class="logo">
        <span class="logo-name">PORTOR</span>
      </div>

      <div class="badge">
        <i class="fas fa-code"></i> Création SaaS sur mesure
      </div>
      <h1>Donnez vie à <span class="gradient-text">votre idée SaaS</span></h1>
      <p class="subtitle">De l'idée au lancement. Remplissez le formulaire et recevez une proposition personnalisée.</p>
      
      <form id="requestForm">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" name="name" placeholder="Nom complet" required>
        </div>
        <div class="input-group">
          <i class="fas fa-phone-alt"></i>
          <input type="tel" name="phone" placeholder="Téléphone (optionnel)">
        </div>
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" placeholder="Adresse email" required>
        </div>
        <div class="input-group">
          <i class="fas fa-cube"></i>
          <input type="text" name="project" placeholder="Nom de votre SaaS" required>
        </div>
        <div class="input-group">
          <i class="fas fa-comment"></i>
          <textarea name="description" rows="4" placeholder="Décrivez votre besoin (fonctionnalités clés, public cible...)" required></textarea>
        </div>
        <div class="input-group">
          <i class="fas fa-money-bill-wave"></i>
          <select name="budget">
            <option value="" disabled selected>Budget estimé (MAD)</option>
            <option>Moins de 5 000 MAD</option>
            <option>5 000 - 15 000 MAD</option>
            <option>15 000 - 30 000 MAD</option>
            <option>30 000 - 50 000 MAD</option>
            <option>Plus de 50 000 MAD</option>
          </select>
        </div>
        <button type="submit" id="submitBtn">
          <span>Envoyer ma demande</span>
          <i class="fas fa-arrow-right"></i>
        </button>
        <p id="formStatus"></p>
      </form>
      
      <div class="trust-badge">
        <i class="fas fa-shield-alt"></i> Données sécurisées &nbsp;|&nbsp;
        <i class="fas fa-clock"></i> Réponse sous 24h
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
